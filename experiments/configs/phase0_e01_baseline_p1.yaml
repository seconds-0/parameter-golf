group: "phase0-control"
notes: "Calibrate matched P1 spread before E02."

env:
  MAX_WALLCLOCK_SECONDS: "300"
  VAL_LOSS_EVERY: "0"
  TRAIN_LOG_EVERY: "25"
  WARMUP_STEPS: "1"

sweep:
  type: grid
  params:
    SEED: ["1337", "2024"]

naming: "phase0_e01_seed{SEED}"
