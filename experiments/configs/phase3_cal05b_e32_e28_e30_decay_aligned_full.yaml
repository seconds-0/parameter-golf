extends: baseline.yaml
name: phase3_cal05b_e32_e28_e30_decay_aligned_full
description: "Full 8xH100 decomposition rung with E30 transition aligned to WSD decay start"
hypothesis_id: "CAL-05b"
group: "full-decomposition"
notes: "Second E30 full ablation rung after CAL-03 and CAL-04. Delays the E30 large-batch transition until the WSD decay boundary so the batch jump no longer lands in the max-LR stable phase. Uses calibration watchdog policy."
env:
  SEED: "1337"
  MAX_WALLCLOCK_SECONDS: "600"
  TRAIN_LOG_EVERY: "50"
  VAL_LOSS_EVERY: "200"
  WATCHDOG_POLICY: "calibration"
  REQUIRE_COMPLETE_DATASET: "1"
  DATA_PATH: "/runpod/parameter-golf-data/datasets/fineweb10B_sp1024"
  TOKENIZER_PATH: "/runpod/parameter-golf-data/tokenizers/fineweb_1024_bpe.model"
  TMPDIR: "/runpod/pgolf-tmp"
  TORCHINDUCTOR_CACHE_DIR: "/runpod/torchinductor-cache"
  TRITON_CACHE_DIR: "/runpod/triton-cache"
  WARMUP_STEPS: "1"
  LR_SCHEDULE: "wsd"
  WSD_WARMUP_FRAC: "0.01"
  WSD_STABLE_FRAC: "0.75"
  WSD_DECAY_STYLE: "cosine"
  LOGIT_SOFTCAP_POS: "20"
  LOGIT_SOFTCAP_NEG: "30"
  BATCH_SCHEDULE: "0.75:131072,1.0:524288"
