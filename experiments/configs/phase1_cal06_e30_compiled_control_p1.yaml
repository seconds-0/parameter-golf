extends: baseline.yaml
name: phase1_cal06_e30_compiled_control_p1
description: "Runpod compiled 1xH100 control for E30 confirmation"
hypothesis_id: "CAL-06-control"
group: "compiled-check"
notes: "Compiled Runpod 1xH100 control on the promoted WSD + asymmetric (20,30) base. This resolves the compile versus eager confound for E30 at cheap scale."
env:
  SEED: "1337"
  MAX_WALLCLOCK_SECONDS: "300"
  VAL_LOSS_EVERY: "0"
  TRAIN_LOG_EVERY: "25"
  DATA_PATH: "/runpod/parameter-golf-data/datasets/fineweb10B_sp1024"
  TOKENIZER_PATH: "/runpod/parameter-golf-data/tokenizers/fineweb_1024_bpe.model"
  TMPDIR: "/runpod/pgolf-tmp"
  TORCHINDUCTOR_CACHE_DIR: "/runpod/torchinductor-cache"
  TRITON_CACHE_DIR: "/runpod/triton-cache"
  WARMUP_STEPS: "1"
  LR_SCHEDULE: "wsd"
  WSD_WARMUP_FRAC: "0.01"
  WSD_STABLE_FRAC: "0.75"
  WSD_DECAY_STYLE: "cosine"
  LOGIT_SOFTCAP_POS: "20"
  LOGIT_SOFTCAP_NEG: "30"
