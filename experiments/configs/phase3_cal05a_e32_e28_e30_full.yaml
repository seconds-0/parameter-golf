extends: baseline.yaml
name: phase3_cal05a_e32_e28_e30_full
description: "Full 8xH100 decomposition rung with WSD + asymmetric (20,30) + original E30"
hypothesis_id: "CAL-05a"
group: "full-decomposition"
notes: "First E30 full reintroduction rung after CAL-03 and CAL-04. Keeps the original E30 transition at 30 percent of steps on top of the full-trusted WSD + asymmetric (20,30) stack. Uses calibration watchdog policy."
env:
  SEED: "1337"
  MAX_WALLCLOCK_SECONDS: "600"
  TRAIN_LOG_EVERY: "50"
  VAL_LOSS_EVERY: "200"
  WATCHDOG_POLICY: "calibration"
  REQUIRE_COMPLETE_DATASET: "1"
  DATA_PATH: "/runpod/parameter-golf-data/datasets/fineweb10B_sp1024"
  TOKENIZER_PATH: "/runpod/parameter-golf-data/tokenizers/fineweb_1024_bpe.model"
  TMPDIR: "/runpod/pgolf-tmp"
  TORCHINDUCTOR_CACHE_DIR: "/runpod/torchinductor-cache"
  TRITON_CACHE_DIR: "/runpod/triton-cache"
  WARMUP_STEPS: "1"
  LR_SCHEDULE: "wsd"
  WSD_WARMUP_FRAC: "0.01"
  WSD_STABLE_FRAC: "0.75"
  WSD_DECAY_STYLE: "cosine"
  LOGIT_SOFTCAP_POS: "20"
  LOGIT_SOFTCAP_NEG: "30"
  BATCH_SCHEDULE: "0.3:131072,1.0:524288"
